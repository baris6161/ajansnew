<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle: espresso -->
  <circle cx="50" cy="50" r="48" fill="#2a211b"/>

  <!-- FORK — 4 tines, centered at x≈36 -->
  <rect x="27.5" y="13" width="2.5" height="26" rx="1.25" fill="white"/>
  <rect x="32"   y="13" width="2.5" height="26" rx="1.25" fill="white"/>
  <rect x="36.5" y="13" width="2.5" height="26" rx="1.25" fill="white"/>
  <rect x="41"   y="13" width="2.5" height="26" rx="1.25" fill="white"/>
  <!-- neck: trapezoid connecting tine bases to handle -->
  <polygon points="27.5,39 43.5,39 39.5,45 32,45" fill="white"/>
  <!-- handle -->
  <rect x="32" y="44" width="7" height="44" rx="3.5" fill="white"/>

  <!-- SPOON — bowl + handle as single path, centered at x=65 -->
  <path d="M65 13
    C56 13 55 40 62 46
    L62 88 Q62 90.5 65 90.5 Q68 90.5 68 88
    L68 46
    C75 40 74 13 65 13 Z"
    fill="white"/>
</svg>
